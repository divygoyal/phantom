<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0a0a0a;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: #0a0a0a;
      }

      /* === FULL-SCREEN B-ROLL BACKGROUND === */
      .broll {
        position: absolute;
        inset: 0;
        width: 1080px; height: 1920px;
        object-fit: cover;
        opacity: 0;
        z-index: 1;
      }
      .broll-tint {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg,
          rgba(0,0,0,0) 0%,
          rgba(0,0,0,0.10) 40%,
          rgba(0,0,0,0.55) 80%,
          rgba(0,0,0,0.85) 100%);
        z-index: 4;
        pointer-events: none;
      }

      /* === BEAT TAG (top left, persistent) === */
      .beat-tag {
        position: absolute;
        top: 50px; left: 50px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        background: rgba(15, 23, 42, 0.55);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 999px;
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        opacity: 0;
        z-index: 15;
      }
      .beat-tag-dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #22d3ee;
        box-shadow: 0 0 16px rgba(34, 211, 238, 0.8);
      }

      /* === CAPTIONS (middle-upper area, big and bold) === */
      .caption-band {
        position: absolute;
        left: 60px; right: 60px;
        top: 760px;
        font-size: 92px;
        line-height: 1.04;
        font-weight: 900;
        letter-spacing: -0.03em;
        color: #ffffff;
        text-align: left;
        text-shadow:
          0 6px 32px rgba(0,0,0,0.85),
          0 0 1px rgba(0,0,0,0.95);
        opacity: 0;
        z-index: 10;
      }

      /* === AVATAR (transparent webm overlay) === */
      .avatar-video {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 1080px;
        height: 1920px; /* preserves the avatar's framing — it was rendered at 1080x1920 with avatar at bottom */
        object-fit: contain;
        object-position: center bottom;
        z-index: 6;
        pointer-events: none;
      }

      /* === HOOK OVERLAY (B1 takeover) === */
      .hook-overlay {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at center, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.78) 100%);
        backdrop-filter: blur(6px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 80px;
        opacity: 0;
        z-index: 20;
      }
      .hook-prefix {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 600;
        color: #22d3ee;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        margin-bottom: 36px;
      }
      .hook-text {
        font-size: 130px;
        line-height: 0.96;
        font-weight: 900;
        letter-spacing: -0.04em;
        color: #ffffff;
        text-align: center;
        text-shadow: 0 10px 60px rgba(0,0,0,0.7);
      }

      /* === OUTRO === */
      .outro {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, #0f172a 0%, #020617 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        opacity: 0;
        z-index: 35;
      }
      .outro-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 900px; height: 900px;
        background: radial-gradient(circle, rgba(34, 211, 238, 0.22) 0%, transparent 60%);
        pointer-events: none;
      }
      .outro-handle {
        font-size: 96px;
        font-weight: 900;
        color: #22d3ee;
        letter-spacing: -0.03em;
        text-shadow: 0 0 80px rgba(34, 211, 238, 0.5);
        position: relative;
        z-index: 2;
      }
      .outro-cta {
        font-size: 36px;
        font-weight: 600;
        color: #cbd5e1;
        letter-spacing: 0.04em;
        position: relative;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="34.58"
      data-width="1080"
      data-height="1920"
    >
      <!-- FULL-SCREEN B-ROLL per beat -->
      <img id="broll-1" class="broll clip" data-start="0.00" data-duration="3.00" data-track-index="0" src="assets/gemini-f109xi.png" alt="b-roll 1" />
      <img id="broll-2" class="broll clip" data-start="3.00" data-duration="4.19" data-track-index="0" src="assets/gemini-h03xdc.png" alt="b-roll 2" />
      <img id="broll-3" class="broll clip" data-start="7.19" data-duration="3.00" data-track-index="0" src="assets/gemini-ti5csu.png" alt="b-roll 3" />
      <img id="broll-4" class="broll clip" data-start="10.19" data-duration="10.23" data-track-index="0" src="assets/gemini-7urmx1.png" alt="b-roll 4" />
      <img id="broll-5" class="broll clip" data-start="20.42" data-duration="3.00" data-track-index="0" src="assets/gemini-ti5csu.png" alt="b-roll 5" />
      <img id="broll-6" class="broll clip" data-start="23.42" data-duration="11.16" data-track-index="0" src="assets/gemini-84nasf.png" alt="b-roll 6" />

      <!-- Soft tint at the bottom so captions read against any b-roll -->
      <div class="broll-tint"></div>

      <!-- AVATAR (transparent webm, full-frame, native position from template) -->
      <video
        id="avatar"
        class="avatar-video clip"
        muted
        
        data-start="0"
        data-duration="34.58"
        data-track-index="3"
        src="assets/avatar-article-anthropic-wikipedia-1778862175436.webm"
      ></video>

      <!-- AUDIO: original mp4 (always has voice) -->
      <audio
        id="avatar-audio"
        class="clip"
        data-start="0"
        data-duration="34.58"
        data-track-index="4"
        src="assets/avatar-article-anthropic-wikipedia-1778862175436.mp4"
      ></audio>

      <!-- BEAT TAGS -->
      <div id="tag-1" class="beat-tag clip" data-start="0.00" data-duration="3.00" data-track-index="2"><span class="beat-tag-dot"></span>beat 1 of 6</div>
      <div id="tag-2" class="beat-tag clip" data-start="3.00" data-duration="4.19" data-track-index="2"><span class="beat-tag-dot"></span>beat 2 of 6</div>
      <div id="tag-3" class="beat-tag clip" data-start="7.19" data-duration="3.00" data-track-index="2"><span class="beat-tag-dot"></span>beat 3 of 6</div>
      <div id="tag-4" class="beat-tag clip" data-start="10.19" data-duration="10.23" data-track-index="2"><span class="beat-tag-dot"></span>beat 4 of 6</div>
      <div id="tag-5" class="beat-tag clip" data-start="20.42" data-duration="3.00" data-track-index="2"><span class="beat-tag-dot"></span>beat 5 of 6</div>
      <div id="tag-6" class="beat-tag clip" data-start="23.42" data-duration="11.16" data-track-index="2"><span class="beat-tag-dot"></span>beat 6 of 6</div>

      <!-- CAPTIONS -->
      <div id="caption-1" class="caption-band clip" data-start="0.00" data-duration="3.00" data-track-index="1"></div>
      <div id="caption-2" class="caption-band clip" data-start="3.00" data-duration="4.19" data-track-index="1">If you're typing "write me a..." you're already</div>
      <div id="caption-3" class="caption-band clip" data-start="7.19" data-duration="3.00" data-track-index="1"></div>
      <div id="caption-4" class="caption-band clip" data-start="10.19" data-duration="10.23" data-track-index="1">Most people treat ChatGPT like a search engine</div>
      <div id="caption-5" class="caption-band clip" data-start="20.42" data-duration="3.00" data-track-index="1"></div>
      <div id="caption-6" class="caption-band clip" data-start="23.42" data-duration="11.16" data-track-index="1">ChatGPT is a roleplay engine. You're not asking</div>

      <!-- HOOK OVERLAY -->
      <div
        id="hook"
        class="hook-overlay clip"
        data-start="0"
        data-duration="3.00"
        data-track-index="6"
      >
        <div class="hook-prefix">phantom · agent live</div>
        <div class="hook-text"></div>
      </div>

      <!-- OUTRO -->
      <div
        id="outro"
        class="outro clip"
        data-start="33.38"
        data-duration="1.20"
        data-track-index="7"
      >
        <div class="outro-glow"></div>
        <div class="outro-handle">@aisimplified</div>
        <div class="outro-cta">subscribe for more</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      // Hook
      tl.fromTo("#hook", { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0);
      tl.fromTo(".hook-prefix", { y: 28, opacity: 0 }, { y: 0, opacity: 1, duration: 0.55 }, 0.15);
      tl.fromTo(".hook-text", { scale: 0.93, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.7 }, 0.28);
      tl.to("#hook", { opacity: 0, duration: 0.55 }, 2.45);
      tl.set("#hook", { opacity: 0 }, 3.00);

      
      // Beat 1: b-roll fade in, tag + caption slide up
      tl.to("#broll-1", { opacity: 1, duration: 0.4 }, 0.00);
      tl.fromTo("#tag-1", { x: -20, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4 }, 0.00);
      tl.fromTo("#caption-1", { y: 36, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5 }, 0.15);
      // Exits
      tl.to("#broll-1", { opacity: 0, duration: 0.35 }, 2.65);
      tl.to("#caption-1", { opacity: 0, y: -14, duration: 0.3 }, 2.70);
      tl.to("#tag-1", { opacity: 0, x: -10, duration: 0.3 }, 2.70);
      // Beat 2: b-roll fade in, tag + caption slide up
      tl.to("#broll-2", { opacity: 1, duration: 0.4 }, 3.00);
      tl.fromTo("#tag-2", { x: -20, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4 }, 3.00);
      tl.fromTo("#caption-2", { y: 36, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5 }, 3.15);
      // Exits
      tl.to("#broll-2", { opacity: 0, duration: 0.35 }, 6.84);
      tl.to("#caption-2", { opacity: 0, y: -14, duration: 0.3 }, 6.89);
      tl.to("#tag-2", { opacity: 0, x: -10, duration: 0.3 }, 6.89);
      // Beat 3: b-roll fade in, tag + caption slide up
      tl.to("#broll-3", { opacity: 1, duration: 0.4 }, 7.19);
      tl.fromTo("#tag-3", { x: -20, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4 }, 7.19);
      tl.fromTo("#caption-3", { y: 36, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5 }, 7.34);
      // Exits
      tl.to("#broll-3", { opacity: 0, duration: 0.35 }, 9.84);
      tl.to("#caption-3", { opacity: 0, y: -14, duration: 0.3 }, 9.89);
      tl.to("#tag-3", { opacity: 0, x: -10, duration: 0.3 }, 9.89);
      // Beat 4: b-roll fade in, tag + caption slide up
      tl.to("#broll-4", { opacity: 1, duration: 0.4 }, 10.19);
      tl.fromTo("#tag-4", { x: -20, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4 }, 10.19);
      tl.fromTo("#caption-4", { y: 36, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5 }, 10.34);
      // Exits
      tl.to("#broll-4", { opacity: 0, duration: 0.35 }, 20.07);
      tl.to("#caption-4", { opacity: 0, y: -14, duration: 0.3 }, 20.12);
      tl.to("#tag-4", { opacity: 0, x: -10, duration: 0.3 }, 20.12);
      // Beat 5: b-roll fade in, tag + caption slide up
      tl.to("#broll-5", { opacity: 1, duration: 0.4 }, 20.42);
      tl.fromTo("#tag-5", { x: -20, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4 }, 20.42);
      tl.fromTo("#caption-5", { y: 36, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5 }, 20.57);
      // Exits
      tl.to("#broll-5", { opacity: 0, duration: 0.35 }, 23.07);
      tl.to("#caption-5", { opacity: 0, y: -14, duration: 0.3 }, 23.12);
      tl.to("#tag-5", { opacity: 0, x: -10, duration: 0.3 }, 23.12);
      // Beat 6: b-roll fade in, tag + caption slide up
      tl.to("#broll-6", { opacity: 1, duration: 0.4 }, 23.42);
      tl.fromTo("#tag-6", { x: -20, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4 }, 23.42);
      tl.fromTo("#caption-6", { y: 36, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5 }, 23.57);
      // Exits
      tl.to("#broll-6", { opacity: 0, duration: 0.35 }, 34.23);
      tl.to("#caption-6", { opacity: 0, y: -14, duration: 0.3 }, 34.28);
      tl.to("#tag-6", { opacity: 0, x: -10, duration: 0.3 }, 34.28);

      // Outro
      tl.fromTo("#outro", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 33.38);
      tl.fromTo(".outro-handle", { scale: 0.94, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.65, ease: "back.out(1.6)" }, 33.48);
      tl.fromTo(".outro-cta", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.45 }, 33.78);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
